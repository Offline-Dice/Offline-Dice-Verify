
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline Dice - Verify</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="shortcut icon" href="favicon.png">
<style>
html,body{
height:100%;
margin:0;
font-family:Arial,sans-serif;
background:
radial-gradient(circle at 50px 50px,#141414 0 18px,transparent 19px),
repeating-linear-gradient(45deg,#0a0a0a 0,#0a0a0a 18px,#141414 18px,#141414 30px);
background-size:120px 120px,60px 60px;
background-color:#050505;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}
.card{
width:430px;
background:linear-gradient(180deg,#111,#090909);
border:1px solid #3b2b00;
border-radius:28px;
padding:42px;
text-align:center;
color:#fff;
box-shadow:0 20px 60px rgba(0,0,0,.65),0 0 0 1px rgba(255,200,0,.15) inset;
}
.logo{font-size:42px}
h1{
margin:10px 0;
font-size:44px;
color:white;
text-shadow:0 0 10px gold;
}
p{color:#ddd}
.row{display:flex;gap:12px;margin-top:25px;align-items:stretch;}
input{
flex:1;
padding:18px;
background:#181818;
border:2px solid #3b2b00;
border-radius:16px;
font-size:22px;
font-weight:bold;
text-align:center;
color:#fff;
transition:.25s;
}
input:focus{
outline:none;
border-color:#ffcb24;
box-shadow:0 0 18px rgba(255,203,36,.35);
}
button{
min-width:120px;
flex:0 0 120px;

background:linear-gradient(#ffd54d,#ffbf00);
color:#111;
border:none;
border-radius:16px;
padding:0 30px;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.25s;
box-shadow:0 8px 20px rgba(255,203,36,.35);
position:relative;
overflow:hidden;
}
button::before{
content:'';
position:absolute;
top:0;left:-120%;
width:60%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
transform:skewX(-20deg);
transition:.6s;
}
button:hover::before{left:150%;}
button:hover{transform:translateY(-2px);}
button:active{transform:scale(.97);}
button.loading{pointer-events:none;opacity:.9;}
button.loading::after{
content:'';
display:inline-block;
width:16px;height:16px;
margin-left:10px;
border:3px solid rgba(255,255,255,.4);
border-top-color:#fff;
border-radius:50%;
animation:spin .7s linear infinite;
vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}
#result{margin-top:20px;font-size:20px;font-weight:bold}
a{display:inline-block;margin-top:20px;color:#ffd400;text-decoration:none;font-weight:bold}

.card{
position:relative;
overflow:hidden;

backdrop-filter:blur(8px);
}
.card::before{
content:"";
position:absolute;
top:-150%;
left:-50%;
width:60%;
height:400%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
transform:rotate(20deg);
animation:shine 5s linear infinite;
pointer-events:none;
}
.logo{
animation:floatDice 2.5s ease-in-out infinite;
}
#result h3{
animation:pop .45s ease;
}
@keyframes floatDice{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}
@keyframes shine{
0%{left:-70%}
100%{left:150%}
}
@keyframes pop{
0%{transform:scale(.5);opacity:0}
70%{transform:scale(1.15)}
100%{transform:scale(1);opacity:1}
}


@keyframes diceReveal{
0%{opacity:0;transform:translateY(20px) scale(.6) rotate(-20deg);}
60%{opacity:1;transform:translateY(-6px) scale(1.12) rotate(8deg);}
100%{opacity:1;transform:translateY(0) scale(1) rotate(0);}
}
.die{
width:34px;
height:34px;
border:2px solid white;
border-radius:8px;
box-shadow:0 0 15px rgba(255,255,255,.2);
opacity:0;
animation:diceReveal .5s forwards;
}

</style>
</head>
<body>
<div class="card">
<div class="logo">🎲</div>
<h1>VERIFY ROLL</h1>
<p>Enter the Result ID</p>

<div class="row">
<input id="code" placeholder="EHH27W">
<button onclick="verify()">VERIFY</button>
</div>

<div id="result"></div>

<a href="https://offline-dice.de" target="_blank">← BACK TO OFFLINE DICE</a>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHOZz9Fvo7p7Qff6MSs_KQvcpCAsXsnB0",
  authDomain: "offline-verify.firebaseapp.com",
  projectId: "offline-verify",
  storageBucket: "offline-verify.firebasestorage.app",
  messagingSenderId: "933592631727",
  appId: "1:933592631727:web:2ce91e9e8ac4e11930875a",
  measurementId: "G-SFXFFR772X"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.verify = async function(){
 const btn=document.querySelector("button");
 btn.classList.add("loading");
 btn.textContent="VERIFYING";
 const code=document.getElementById("code").value.trim().toUpperCase();
 const result=document.getElementById("result");
 if(!code){
   result.style.color="#ff8080";
   result.innerHTML="❌ ENTER RESULT ID";
   btn.classList.remove("loading");
   btn.textContent="VERIFY";
   return;
 }
 try{
   const snap=await getDoc(doc(db,"rolls",code));
   if(!snap.exists()){
      result.style.color="#ff8080";
      result.innerHTML="❌ INVALID RESULT ID";
      return;
   }
   const spin=snap.data();
   result.style.color="#7CFF7C";
   result.innerHTML="<h3>✅ VERIFIED</h3>"
   +"<p>Result ID: "+spin.id+"</p>"
   +"<div style='display:flex;justify-content:center;gap:8px'>"
   +(spin.colors||[]).map((c,i)=>"<div class='die' style='background:"+c+";animation-delay:"+(i*0.12)+"s'></div>").join("")
   +"</div><p style='margin-top:10px'>"+(spin.time||"")+"</p>";
 }catch(e){
   console.error(e);
   result.style.color="#ff8080";
   result.innerHTML="❌ FIREBASE ERROR";
 }
 btn.classList.remove("loading");
 btn.textContent="VERIFY";
}

document.getElementById("code").addEventListener("keydown",e=>{
 if(e.key==="Enter") verify();
});

</script>

</body>
</html>
